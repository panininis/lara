name: Build IPA

on:
  push:

jobs:
  build-ipa:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build IPA (Release)
        env:
          LARA_LDID_SIGN: "0"
        run: |
          bash scripts/build_ipa.sh

      - name: Upload to "latest" release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          files: dist/lara.ipa
          overwrite: true
